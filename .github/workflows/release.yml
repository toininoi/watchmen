name: release

# Fires when a tag matching v0.5.0, v1.0.0, etc. is pushed. Builds wheel +
# sdist, smoke-tests the wheel in a fresh venv, attaches both to a GitHub
# Release, and (when the `PUBLISH_TO_PYPI` repo variable is set to 'true')
# publishes to PyPI via OIDC trusted publishing — no API tokens stored.
#
# To enable PyPI publishing:
#   1. Claim the `watchmen` project on PyPI (pending-publisher works for
#      first publish — register at https://pypi.org/manage/account/publishing/).
#   2. Add this repo as a trusted publisher: owner=firstbatchxyz,
#      repo=watchmen, workflow=release.yml, environment=pypi.
#   3. Create a "pypi" GitHub Environment on this repo (Settings →
#      Environments → New environment) so the publish job has a deploy
#      gate the maintainer must approve per release.
#   4. Set the `PUBLISH_TO_PYPI` repo variable to `true` (Settings →
#      Secrets and variables → Actions → Variables).
on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+', 'v[0-9]+.[0-9]+.[0-9]+-*']

permissions:
  contents: write     # to create the GitHub Release
  id-token: write     # for PyPI trusted publishing (OIDC)

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so the changelog generator can walk back

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Extract version from tag
        id: tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building watchmen $VERSION (tag $TAG)"

      - name: Verify pyproject.toml version matches the tag
        run: |
          PY_VERSION=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$PY_VERSION" != "${{ steps.tag.outputs.version }}" ]; then
            echo "::error::pyproject version ($PY_VERSION) doesn't match tag (${{ steps.tag.outputs.version }})"
            exit 1
          fi

      - name: Build wheel + sdist
        run: uv build

      - name: Smoke-test the built wheel
        run: |
          uv venv /tmp/release-check
          uv pip install --python /tmp/release-check/bin/python dist/watchmen-*.whl
          /tmp/release-check/bin/watchmen --version
          /tmp/release-check/bin/watchmen --help > /dev/null

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  github-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  # Gated on the `PUBLISH_TO_PYPI` repo variable so contributors who fork
  # the repo and tag releases don't accidentally publish. Flip the
  # variable from the repo settings UI when PyPI trusted publishing is
  # configured (see the workflow header for the setup steps).
  pypi-publish:
    needs: build
    runs-on: ubuntu-latest
    if: vars.PUBLISH_TO_PYPI == 'true'
    environment:
      name: pypi
      url: https://pypi.org/p/watchmen
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
