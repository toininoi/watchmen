name: release

# Fires when a tag matching v0.5.0, v1.0.0, etc. is pushed.
# Phase 6 of the handover will use this for the first PyPI publish; until
# then the workflow is a draft — pushing a tag will build a wheel + sdist
# and attach them to the GitHub Release, but the PyPI publish step is
# guarded behind a repo-level `secrets.PYPI_TRUSTED_PUBLISHER` flag so it
# stays off until the project's PyPI account is set up with OIDC.
on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+', 'v[0-9]+.[0-9]+.[0-9]+-*']

permissions:
  contents: write     # to create the GitHub Release
  id-token: write     # for PyPI trusted publishing (OIDC)

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so the changelog generator can walk back

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Extract version from tag
        id: tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building watchmen $VERSION (tag $TAG)"

      - name: Verify pyproject.toml version matches the tag
        run: |
          PY_VERSION=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$PY_VERSION" != "${{ steps.tag.outputs.version }}" ]; then
            echo "::error::pyproject version ($PY_VERSION) doesn't match tag (${{ steps.tag.outputs.version }})"
            exit 1
          fi

      - name: Build wheel + sdist
        run: uv build

      - name: Smoke-test the built wheel
        run: |
          uv venv /tmp/release-check
          uv pip install --python /tmp/release-check/bin/python dist/watchmen-*.whl
          /tmp/release-check/bin/watchmen --version
          /tmp/release-check/bin/watchmen --help > /dev/null

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  github-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  # Disabled until Phase 6 enables PyPI OIDC trusted publishing on the
  # firstbatchxyz/watchmen repo. To enable: register the project on PyPI,
  # add this repo + workflow as a trusted publisher, then flip the `if`
  # condition below to `true` (or drop the guard entirely).
  pypi-publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/watchmen
    if: false
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
