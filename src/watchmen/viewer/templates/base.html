<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}watchmen{% endblock %}</title>

  <!-- Inter via Bunny Fonts (GDPR-safe Google Fonts mirror; no third-party
       cookies). Stays cached in the browser; falls back to system fonts. -->
  <link rel="preconnect" href="https://fonts.bunny.net" crossorigin />
  <link rel="stylesheet" href="https://fonts.bunny.net/css?family=inter:400,500,600,700&display=swap" />

  <!-- Tailwind config has to be inlined BEFORE the CDN script so the JIT
       compiler picks up the extended theme on first render. -->
  <script>
    window.tailwind = window.tailwind || {};
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'system-ui', 'sans-serif'],
          },
          borderRadius: {
            'card': '0.75rem',  // 12px — softer than rounded-lg, our default for cards
          },
          boxShadow: {
            'card': '0 1px 2px 0 rgb(0 0 0 / 0.04), 0 1px 1px 0 rgb(0 0 0 / 0.02)',
            'card-hover': '0 4px 6px -1px rgb(0 0 0 / 0.06), 0 2px 4px -2px rgb(0 0 0 / 0.04)',
          },
        },
      },
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.7.0/github-markdown-light.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/PrismJS/prism@v1.29/themes/prism.min.css" />

  <style>
    /* ── Design tokens ────────────────────────────────────────────────
       Loose shadcn-light palette mapped to HSL so future variants
       (dark mode, accent themes) only need to swap these triples. */
    :root {
      --max: 1100px;
      --background:        220 14% 98%;  /* page bg, slightly cooler than gray-50 */
      --foreground:        222  9% 15%;
      --muted:             220 13% 95%;
      --muted-foreground:  220  9% 46%;
      --card:                0  0% 100%;
      --card-foreground:   222  9% 15%;
      --border:            220 13% 91%;
      --border-strong:     220 13% 82%;
      --accent:            243 75% 59%;  /* indigo-600 — keep the existing brand */
      --accent-soft:       243 80% 96%;
    }

    /* ── Typography rhythm ────────────────────────────────────────── */
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
      font-feature-settings: 'cv11', 'ss01', 'ss03';
      letter-spacing: -0.005em;
      background: hsl(var(--background));
      color: hsl(var(--foreground));
    }
    h1, h2, h3 { letter-spacing: -0.018em; }
    h1 { line-height: 1.2; }
    h2, h3 { line-height: 1.3; }

    .markdown-body {
      box-sizing: border-box;
      padding: 24px;
      max-width: var(--max);
      margin: 0 auto;
      font-family: 'Inter', system-ui, sans-serif;
    }
    .codehilite {
      background: hsl(var(--muted));
      border: 1px solid hsl(var(--border));
      border-radius: 8px;
      padding: 12px;
      overflow-x: auto;
      font-size: 13px;
    }
    .codehilite pre { margin: 0; }
    table { font-size: 14px; }
    code { font-size: 13px; }
    pre code { font-size: 13px; }

    /* ── Nav: pill-style active highlight, smoother hovers ───────── */
    .wm-nav-link {
      color: hsl(var(--muted-foreground));
      padding: 4px 10px;
      border-radius: 6px;
      transition: color 150ms ease, background-color 150ms ease;
    }
    .wm-nav-link:hover {
      color: hsl(var(--foreground));
      background: hsl(var(--muted));
    }
    .wm-nav-link.is-active {
      color: hsl(var(--foreground));
      background: hsl(var(--accent-soft));
    }

    /* ── Card baseline: applies to legacy .stat-card AND new .wm-card.
       Templates can opt into the polished look without rewriting class
       lists. The shadow stays subtle; hover lifts borders, not shadows,
       to avoid the "everything is floating" feeling shadcn avoids. ── */
    .stat-card, .wm-card {
      background: hsl(var(--card));
      color: hsl(var(--card-foreground));
      border: 1px solid hsl(var(--border));
      border-radius: 12px;
      padding: 16px 18px;
      box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.04);
      transition: border-color 150ms ease, box-shadow 150ms ease;
    }
    .stat-card:hover, .wm-card:hover { border-color: hsl(var(--border-strong)); }
    .stat-card .label, .wm-card .label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: hsl(var(--muted-foreground));
    }
    .stat-card .value, .wm-card .value {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-top: 2px;
      font-variant-numeric: tabular-nums;
    }
    .stat-card .sub, .wm-card .sub {
      font-size: 12px;
      color: hsl(var(--muted-foreground));
      margin-top: 2px;
    }
    .stat-card .spark, .wm-card .spark { margin-top: 8px; display: block; }

    /* ── Adapter pills shown on /insights + a few other surfaces ── */
    .adapter-pill {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 999px;
      background: hsl(var(--muted));
      color: hsl(var(--muted-foreground));
      font-size: 11px;
      font-weight: 500;
      margin-right: 4px;
      margin-bottom: 2px;
    }

    /* ── Skill-card hover from the dashboard's per-project list ─── */
    .skill-card { transition: background 0.12s ease; }
    .skill-card:hover { background: hsl(var(--muted)); }

    /* ── Tabular numeric columns: we read columns of numbers a lot,
       this lines them up properly. Cheap; high effect. ── */
    .tabular { font-variant-numeric: tabular-nums; }

    /* ── Status pills used in run tables (ok / running / failed). The
       small font + rounded-full + tinted bg matches shadcn's Badge.   */
    .wm-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 500;
      border-radius: 999px;
      letter-spacing: 0.01em;
    }
    .wm-pill-ok      { background: hsl(142 60% 94%); color: hsl(142 60% 26%); }
    .wm-pill-running { background: hsl(45  90% 92%); color: hsl(35  70% 32%); }
    .wm-pill-fail    { background: hsl(0   75% 95%); color: hsl(0   75% 38%); }
    .wm-pill-muted   { background: hsl(var(--muted)); color: hsl(var(--muted-foreground)); }

    /* ── Table-card variant: a .wm-card that hosts a flush table with
       no padding around the edge so the table header bg meets the
       card border cleanly. Used in dashboard + runs + metrics tables. */
    .wm-card-table { padding: 0; overflow: hidden; }
    .wm-card-table > table { width: 100%; border-collapse: collapse; }
    .wm-card-table thead {
      background: hsl(var(--muted));
      border-bottom: 1px solid hsl(var(--border));
    }
    .wm-card-table thead th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: hsl(var(--muted-foreground));
      padding: 10px 16px;
    }
    .wm-card-table tbody td { padding: 10px 16px; border-bottom: 1px solid hsl(var(--border)); }
    .wm-card-table tbody tr:last-child td { border-bottom: 0; }
    .wm-card-table tbody tr { transition: background 120ms ease; }
    .wm-card-table tbody tr:hover { background: hsl(var(--muted) / 0.6); }
  </style>
</head>
<body class="bg-[hsl(var(--background))] text-[hsl(var(--foreground))]">
  <nav class="bg-white border-b border-[hsl(var(--border))] px-6 py-3">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-2">
        <a href="/" class="font-semibold text-base mr-3" style="color: hsl(var(--foreground));">
          <span aria-hidden="true">◷</span> watchmen
        </a>
        {% set path = request.url.path if request else '' %}
        <a href="/"         class="wm-nav-link text-sm {% if path == '/' %}is-active{% endif %}">Dashboard</a>
        <a href="/insights" class="wm-nav-link text-sm {% if path.startswith('/insights') %}is-active{% endif %}">Insights</a>
        <a href="/metrics"  class="wm-nav-link text-sm {% if path.startswith('/metrics') %}is-active{% endif %}">Metrics</a>
        <a href="/runs"     class="wm-nav-link text-sm {% if path.startswith('/runs') %}is-active{% endif %}">Runs</a>
      </div>
      <div class="text-xs" style="color: hsl(var(--muted-foreground));">local viewer</div>
    </div>
  </nav>
  <main class="max-w-7xl mx-auto px-6 py-6">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
