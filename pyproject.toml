[project]
name = "watchmen"
version = "0.4.0"
description = "Local Claude Code session intelligence — observe, analyze, and generate skills + CLAUDE.md per project, autonomously"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115",
    "uvicorn>=0.32",
    "httpx>=0.27",
    "bleach>=6.1",
    "jinja2>=3.1",
    "markdown>=3.7",
    "pygments>=2.18",
    "rich>=13.7",
]

[project.scripts]
watchmen = "cli:main"

[project.urls]
Repository = "https://github.com/firstbatchxyz/watchmen"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
include = [
    "*.py",
    "adapters/**/*.py",
    "viewer/**/*.py", "viewer/templates/*.html",
    "hooks/*.sh",
    "plugin/**/*.py", "plugin/**/*.sh", "plugin/**/*.md", "plugin/**/*.json",
    "CHANGELOG.md",
]
exclude = [
    "tests/**",
]
